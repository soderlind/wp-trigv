name: Manually build release zip

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

env:
  PLUGIN_SLUG: push-notifications-for-trigv
  PLUGIN_ZIP: push-notifications-for-trigv.zip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Stage plugin files
        run: |
          mkdir -p dist/${PLUGIN_SLUG}
          rsync -av --exclude='.git' --exclude-from=.distignore ./ dist/${PLUGIN_SLUG}/

      - name: Create zip
        run: |
          cd dist
          zip -r ../${PLUGIN_ZIP} ${PLUGIN_SLUG}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: ${{ env.PLUGIN_ZIP }}
