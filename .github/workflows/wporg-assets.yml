name: Update WordPress.org Assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.wordpress-org/**'
      - 'readme.txt'

permissions:
  contents: read

jobs:
  assets:
    name: Update WordPress.org plugin assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update assets and readme
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: push-notifications-for-trigv
          # Only sync .wordpress-org assets and readme.txt. Without this, the
          # action rsyncs the whole workspace into trunk/ and deletes
          # trunk/vendor (not present here, since this job skips composer
          # install), which breaks the composer-revert step (svn E000002).
          IGNORE_OTHER_FILES: true
