name: Build and attach release zip

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  PLUGIN_SLUG: wp-trigv
  PLUGIN_ZIP: wp-trigv.zip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Verify update-checker is packaged
        run: test -d vendor/yahnis-elsts/plugin-update-checker

      - name: Stage plugin files
        run: |
          mkdir -p dist/${PLUGIN_SLUG}
          rsync -av --exclude-from=- ./ dist/${PLUGIN_SLUG}/ <<'EOF'
          .git/
          .github/
          docs/
          src/
          tests/
          examples/
          node_modules/
          dist/
          .gitignore
          .gitattributes
          .distignore
          .phpunit.cache/
          CONTEXT.md
          README.md
          phpunit.xml
          vitest.config.js
          package.json
          package-lock.json
          composer.lock
          EOF

      - name: Create zip
        run: |
          cd dist
          zip -r ../${PLUGIN_ZIP} ${PLUGIN_SLUG}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_ZIP }}
